<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 540" role="img">
<title>VHF/UHF receive chain with part numbers</title>
<desc>Three antennas (Tram tri-band, Comet SBB-224NMO, wideband discone) feed routing (triplexer, FM-trap and preamp), then a RX band-select, per-band preselectors (DCI-146-4H, Temwell helical, FreeWave EBF901), a bypassable LNA, into the 7020-SDR receiver.</desc>
<style>
text{font-family:Arial,Helvetica,sans-serif}
.t{font-size:14px;fill:#2C2C2A}
.ts{font-size:12px;fill:#444441}
.th{font-size:14px;font-weight:500;fill:#2C2C2A}
.c-blue rect{fill:#E6F1FB;stroke:#185FA5}
.c-gray rect{fill:#F1EFE8;stroke:#888780}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-gray"><rect x="40" y="40" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="62" text-anchor="middle" dominant-baseline="central">Tram tri-band</text>
<text class="ts" x="130" y="80" text-anchor="middle" dominant-baseline="central">2m-440-900 NMO</text></g>
<g class="c-gray"><rect x="250" y="40" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="62" text-anchor="middle" dominant-baseline="central">Comet SBB-224NMO</text>
<text class="ts" x="340" y="80" text-anchor="middle" dominant-baseline="central">222 MHz whip</text></g>
<g class="c-gray"><rect x="460" y="40" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="62" text-anchor="middle" dominant-baseline="central">Wideband RX</text>
<text class="ts" x="550" y="80" text-anchor="middle" dominant-baseline="central">discone ~50M-1.3G</text></g>

<line x1="130" y1="96" x2="130" y2="120" class="arr" marker-end="url(#arrow)"/>
<line x1="550" y1="96" x2="550" y2="120" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="40" y="120" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="142" text-anchor="middle" dominant-baseline="central">Triplexer</text>
<text class="ts" x="130" y="160" text-anchor="middle" dominant-baseline="central">2m / 440 / 900</text></g>
<g class="c-gray"><rect x="460" y="120" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="142" text-anchor="middle" dominant-baseline="central">FM-trap + preamp</text>
<text class="ts" x="550" y="160" text-anchor="middle" dominant-baseline="central">switchable</text></g>

<line x1="130" y1="176" x2="285" y2="206" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="96" x2="340" y2="206" class="arr" marker-end="url(#arrow)"/>
<line x1="550" y1="176" x2="395" y2="206" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="240" y="208" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="230" text-anchor="middle" dominant-baseline="central">RX band-select</text></g>

<line x1="340" y1="252" x2="118" y2="298" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="252" x2="266" y2="298" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="252" x2="414" y2="298" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="252" x2="562" y2="298" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal"><rect x="50" y="300" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="115" y="322" text-anchor="middle" dominant-baseline="central">2 m</text>
<text class="ts" x="115" y="340" text-anchor="middle" dominant-baseline="central">DCI-146-4H</text></g>
<g class="c-teal"><rect x="200" y="300" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="265" y="322" text-anchor="middle" dominant-baseline="central">222 MHz</text>
<text class="ts" x="265" y="340" text-anchor="middle" dominant-baseline="central">Temwell helical</text></g>
<g class="c-purple"><rect x="350" y="300" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="415" y="322" text-anchor="middle" dominant-baseline="central">70 cm</text>
<text class="ts" x="415" y="340" text-anchor="middle" dominant-baseline="central">Temwell helical</text></g>
<g class="c-purple"><rect x="500" y="300" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="565" y="322" text-anchor="middle" dominant-baseline="central">902 MHz</text>
<text class="ts" x="565" y="340" text-anchor="middle" dominant-baseline="central">FreeWave EBF901</text></g>

<line x1="115" y1="356" x2="318" y2="388" class="arr" marker-end="url(#arrow)"/>
<line x1="265" y1="356" x2="330" y2="388" class="arr" marker-end="url(#arrow)"/>
<line x1="415" y1="356" x2="350" y2="388" class="arr" marker-end="url(#arrow)"/>
<line x1="565" y1="356" x2="362" y2="388" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue"><rect x="240" y="390" width="200" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="410" text-anchor="middle" dominant-baseline="central">Bypassable LNA</text>
<text class="ts" x="340" y="426" text-anchor="middle" dominant-baseline="central">preselector ahead of LNA</text></g>
<line x1="340" y1="438" x2="340" y2="468" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue"><rect x="240" y="470" width="200" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="490" text-anchor="middle" dominant-baseline="central">7020-SDR</text>
<text class="ts" x="340" y="506" text-anchor="middle" dominant-baseline="central">RX -&gt; 6 GHz</text></g>
</svg>
