<svg xmlns="http://www.w3.org/2000/svg" width="900" viewBox="0 0 900 300" role="img">
<title>Amateur bands in node range, all IARU regions</title>
<desc>Every amateur band the node can transmit on, 4 m (70 MHz) through 5 cm (5.8 GHz), placed on a log-frequency axis and colour-tagged by IARU region availability: all regions (R1/R2/R3), Region 2 only (the Americas: 1.25 m and 33 cm), Region 1 only (4 m), or varies by country (9 cm). Receive is continuous to 6 GHz. Band edges vary nationally.</desc>
<style>text{font-family:Arial,Helvetica,sans-serif}.t{font-size:14px;fill:#2C2C2A}.ts{font-size:11px;fill:#56554f}.tn{font-size:12px;font-weight:600;fill:#2C2C2A}.tf{font-size:9px;fill:#56554f}.tr{font-size:9px;font-weight:600}.lbl{font-size:12px;font-weight:600;fill:#2C2C2A}.cap{font-size:10px;fill:#6b6a64}.grid{stroke:#e4e2db;stroke-width:1}.gl{font-size:9px;fill:#9a988f}.axis{stroke:#c4c2bb;stroke-width:1}</style>
<text class="t" x="20" y="28" font-size="17" font-weight="700">Amateur bands in node TX range – all IARU regions</text>
<text class="ts" x="20" y="48" font-size="12">4 m (70 MHz) through 5 cm (5.8 GHz) on a log-frequency axis; colour = where each band exists.</text>
<line class="grid" x1="156.1" y1="86" x2="156.1" y2="182"/>
<text class="gl" x="156.1" y="80" text-anchor="middle">100 MHz</text>
<line class="grid" x1="273.0" y1="86" x2="273.0" y2="182"/>
<text class="gl" x="273.0" y="80" text-anchor="middle">200 MHz</text>
<line class="grid" x1="427.5" y1="86" x2="427.5" y2="182"/>
<text class="gl" x="427.5" y="80" text-anchor="middle">500 MHz</text>
<line class="grid" x1="544.4" y1="86" x2="544.4" y2="182"/>
<text class="gl" x="544.4" y="80" text-anchor="middle">1 GHz</text>
<line class="grid" x1="661.3" y1="86" x2="661.3" y2="182"/>
<text class="gl" x="661.3" y="80" text-anchor="middle">2 GHz</text>
<line class="grid" x1="815.8" y1="86" x2="815.8" y2="182"/>
<text class="gl" x="815.8" y="80" text-anchor="middle">5 GHz</text>
<g>
<rect x="73.0" y="100" width="46" height="46" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
<text class="tn" x="96.0" y="121" text-anchor="middle">4 m</text>
<text class="tf" x="96.0" y="137" text-anchor="middle">70.0–70.5</text>
<text class="tr" x="96.0" y="166" text-anchor="middle" fill="#185FA5">R1</text>
</g>
<g>
<rect x="196.9" y="100" width="46" height="46" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
<text class="tn" x="219.9" y="121" text-anchor="middle">2 m</text>
<text class="tf" x="219.9" y="137" text-anchor="middle">144–148</text>
<text class="tr" x="219.9" y="166" text-anchor="middle" fill="#0F6E56">R1·R2·R3</text>
</g>
<g>
<rect x="268.4" y="100" width="46" height="46" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text class="tn" x="291.4" y="121" text-anchor="middle">1.25 m</text>
<text class="tf" x="291.4" y="137" text-anchor="middle">222–225</text>
<text class="tr" x="291.4" y="166" text-anchor="middle" fill="#534AB7">R2</text>
</g>
<g>
<rect x="381.0" y="100" width="46" height="46" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
<text class="tn" x="404.0" y="121" text-anchor="middle">70 cm</text>
<text class="tf" x="404.0" y="137" text-anchor="middle">420–450</text>
<text class="tr" x="404.0" y="166" text-anchor="middle" fill="#0F6E56">R1·R2·R3</text>
</g>
<g>
<rect x="506.4" y="100" width="46" height="46" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
<text class="tn" x="529.4" y="121" text-anchor="middle">33 cm</text>
<text class="tf" x="529.4" y="137" text-anchor="middle">902–928</text>
<text class="tr" x="529.4" y="166" text-anchor="middle" fill="#534AB7">R2</text>
</g>
<g>
<rect x="561.7" y="100" width="46" height="46" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
<text class="tn" x="584.7" y="121" text-anchor="middle">23 cm</text>
<text class="tf" x="584.7" y="137" text-anchor="middle">1240–1300</text>
<text class="tr" x="584.7" y="166" text-anchor="middle" fill="#0F6E56">R1·R2·R3</text>
</g>
<g>
<rect x="667.2" y="100" width="46" height="46" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
<text class="tn" x="690.2" y="121" text-anchor="middle">13 cm</text>
<text class="tf" x="690.2" y="137" text-anchor="middle">2300–2450</text>
<text class="tr" x="690.2" y="166" text-anchor="middle" fill="#0F6E56">R1·R2·R3</text>
</g>
<g>
<rect x="727.7" y="100" width="46" height="46" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="1.2"/>
<text class="tn" x="750.7" y="121" text-anchor="middle">9 cm</text>
<text class="tf" x="750.7" y="137" text-anchor="middle">3300–3500</text>
<text class="tr" x="750.7" y="166" text-anchor="middle" fill="#888780">varies</text>
</g>
<g>
<rect x="817.4" y="100" width="46" height="46" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
<text class="tn" x="840.4" y="121" text-anchor="middle">5 cm</text>
<text class="tf" x="840.4" y="137" text-anchor="middle">5650–5925</text>
<text class="tr" x="840.4" y="166" text-anchor="middle" fill="#0F6E56">R1·R2·R3</text>
</g>
<text class="lbl" x="20" y="205">Receive</text>
<rect x="70" y="190" width="790" height="26" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text class="t" x="465" y="207" text-anchor="middle" font-size="12">continuous to 6 GHz – a wide monitoring dividend above the ham bands</text>
<rect x="70" y="236" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text class="ts" x="87" y="246">all regions (R1/R2/R3)</text>
<rect x="242" y="236" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text class="ts" x="259" y="246">Region 2 only (Americas)</text>
<rect x="426" y="236" width="12" height="12" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text class="ts" x="443" y="246">Region 1 only</text>
<rect x="544" y="236" width="12" height="12" rx="3" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
<text class="ts" x="561" y="246">varies by country</text>
<text class="cap" x="20" y="274">Band edges and sub-allocations vary by country – always confirm your national band plan. 13 cm / 9 cm / 5 cm edges differ most.</text>
<text class="cap" x="20" y="290">6 m (50 MHz) and below ride the separate HF SDR. See docs/regions.md for the full region-by-region detail.</text>
</svg>