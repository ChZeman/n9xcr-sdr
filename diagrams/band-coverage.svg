<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 352" role="img">
<title>Band coverage map</title>
<desc>Transmit bands 2 m, 222, 70 cm and 902 (LDMOS and GaN); receive to 6 GHz; HF exciter 0.5 to 30 MHz; wideband receive antenna roughly 50 MHz to 1.3 GHz. 6 m is a future HF-board swap. Conceptual, not to scale.</desc>
<style>
text{font-family:Arial,Helvetica,sans-serif}
.t{font-size:14px;fill:#2C2C2A}.ts{font-size:12px;fill:#444441}.th{font-size:14px;font-weight:500;fill:#2C2C2A}
.lbl{font-size:12px;font-weight:500;fill:#2C2C2A}
.c-blue rect{fill:#E6F1FB;stroke:#185FA5}.c-gray rect{fill:#F1EFE8;stroke:#888780}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56}.c-purple rect{fill:#EEEDFE;stroke:#534AB7}
.axis{stroke:#c4c2bb;stroke-width:1;fill:none}
</style>
<defs><marker id="ax" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#c4c2bb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<line x1="120" y1="50" x2="630" y2="50" class="axis" marker-end="url(#ax)"/>
<text class="ts" x="120" y="44">frequency -&gt;</text>

<text class="lbl" x="12" y="96">Transmit</text>
<g class="c-teal"><rect x="120" y="72" width="90" height="40" rx="6" stroke-width="0.5"/>
<text class="th" x="165" y="86" text-anchor="middle" dominant-baseline="central">2 m</text>
<text class="ts" x="165" y="102" text-anchor="middle" dominant-baseline="central">144-148</text></g>
<g class="c-teal"><rect x="220" y="72" width="90" height="40" rx="6" stroke-width="0.5"/>
<text class="th" x="265" y="86" text-anchor="middle" dominant-baseline="central">222</text>
<text class="ts" x="265" y="102" text-anchor="middle" dominant-baseline="central">222-225</text></g>
<g class="c-purple"><rect x="330" y="72" width="100" height="40" rx="6" stroke-width="0.5"/>
<text class="th" x="380" y="86" text-anchor="middle" dominant-baseline="central">70 cm</text>
<text class="ts" x="380" y="102" text-anchor="middle" dominant-baseline="central">420-450</text></g>
<g class="c-purple"><rect x="450" y="72" width="100" height="40" rx="6" stroke-width="0.5"/>
<text class="th" x="500" y="86" text-anchor="middle" dominant-baseline="central">902</text>
<text class="ts" x="500" y="102" text-anchor="middle" dominant-baseline="central">902-928</text></g>

<text class="lbl" x="12" y="166">Receive</text>
<g class="c-blue"><rect x="120" y="142" width="520" height="40" rx="6" stroke-width="0.5"/>
<text class="th" x="380" y="162" text-anchor="middle" dominant-baseline="central">to 6 GHz (HF through microwave)</text></g>

<text class="lbl" x="12" y="226">HF exciter</text>
<g class="c-gray"><rect x="120" y="202" width="180" height="40" rx="6" stroke-width="0.5"/>
<text class="th" x="210" y="222" text-anchor="middle" dominant-baseline="central">HF 0.5-30 MHz (HL2)</text></g>

<text class="lbl" x="12" y="286">Wideband RX</text>
<g class="c-gray"><rect x="120" y="262" width="420" height="40" rx="6" stroke-width="0.5"/>
<text class="th" x="330" y="282" text-anchor="middle" dominant-baseline="central">~50 MHz - 1.3 GHz  (4m - FM - ADS-B - gaps)</text></g>

<text class="ts" x="12" y="330">6 m (50-54): future HF-board swap. Not to scale.</text>
<rect class="c-teal" x="470" y="320" width="12" height="12" rx="3" stroke-width="0.5"/>
<text class="ts" x="486" y="330">LDMOS</text>
<rect class="c-purple" x="552" y="320" width="12" height="12" rx="3" stroke-width="0.5"/>
<text class="ts" x="568" y="330">GaN</text>
</svg>
