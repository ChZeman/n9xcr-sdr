<circle cx="130" cy="312" r="2.5" fill="#b88a2e"/>
<text class="biaslbl" x="22" y="294">VGG −V</text>
<text class="caut" x="22" y="306" fill="#7a5b1e">operate ≈−2.7…−3.0 V</text>
<text class="caut" x="22" y="318" fill="#7a5b1e">cutoff ≤ −8 V in RX (keyed)</text>
<text class="biaslbl" x="350" y="314">Negative gate bias + 28 V drain are supplied and</text>
<text class="biaslbl" x="350" y="328">keyed by the control board — not generated here.</text>
<rect class="cau" x="16" y="350" width="648" height="60" rx="6"/>
<text class="cauh" x="28" y="370">⚠ GaN bias sequencing (hard rule — depletion-mode device conducts at VGS = 0)</text>
<text class="caut" x="28" y="387">Power-up: apply VGG (−V, at/below pinch-off so U1 is OFF) FIRST, then VDD +28 V; trim VGG up to set IDQ while watching drain current.</text>
<text class="caut" x="28" y="401">Power-down: remove VDD FIRST, then VGG. Never apply VDD with the gate at 0 V / floating. The control wrapper enforces this and keys bias TX-only.</text>
<rect class="box" x="16" y="424" width="648" height="400" rx="6"/>
