<text class="sec" x="560" y="754">Notes</text>
<text class="td" x="28" y="770">2 m</text>
<text class="td" x="120" y="770">RF8 / MRF101AN</text>
<text class="td" x="300" y="770">≈20 dB</text>
<text class="td" x="420" y="770">≈1 nF</text>
<text class="td" x="560" y="770">easiest match</text>
<text class="td" x="28" y="788">222</text>
<text class="td" x="120" y="788">RF5 / MRF101AN</text>
<text class="td" x="300" y="788">≈19 dB</text>
<text class="td" x="420" y="788">≈680 pF</text>
<text class="td" x="560" y="788">—</text>
<text class="td" x="28" y="806">70 cm</text>
<text class="td" x="120" y="806">RF4 / CGH40120F</text>
<text class="td" x="300" y="806">≈18 dB</text>
<text class="td" x="420" y="806">≈100 pF</text>
<text class="td" x="560" y="806">—</text>
<text class="td" x="28" y="824">902</text>
<text class="td" x="120" y="824">RF3 / CGH40120F</text>
<text class="td" x="300" y="824">≈16 dB</text>
<text class="td" x="420" y="824">≈33–47 pF</text>
<text class="td" x="560" y="824">touchiest — tight layout</text>
<text class="cap2" x="28" y="852">One CGH40010 per band (4 builds). Run ≈100–150 mA IDQ (leaner than the 200 mA reference) to cut idle heat; ≤4 W out at 80 W worst case ≈ 30% of rating → clean IMD.</text>
<text class="cap2" x="28" y="867">Full sourcing + bias detail: docs/driver.md. Reference: Wolfspeed/MACOM CGH40010F-AMP. Gain budget: diagrams/gain-budget.svg.</text>
