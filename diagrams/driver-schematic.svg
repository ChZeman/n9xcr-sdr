<text class="h1" x="16" y="26">TX driver stage – CGH40010 GaN HEMT (10 W, DC–6 GHz, 28 V) – Class AB</text>
<text class="h2" x="16" y="44">One device, per-band build: the bias + stability network is common; the input/output match retunes per band (see strip + docs/driver.md).</text>
<text class="h2" x="16" y="58">Adapted from the Wolfspeed/MACOM CGH40010F-AMP reference amplifier (Rogers RO4350B). Drives the per-band final to 50 W.</text>
