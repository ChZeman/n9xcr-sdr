<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 472" role="img">
<title>Telemetry path to the UI</title>
<desc>Quantities sensed at the PA flow through a local IO bridge, the LAN, and the node host to web UI tiles. Hard-real-time protection is autonomous at the PA and does not use this path.</desc>
<style>
text{font-family:Arial,Helvetica,sans-serif}
.t{font-size:14px;fill:#2C2C2A}.ts{font-size:12px;fill:#444441}.th{font-size:14px;font-weight:500;fill:#2C2C2A}
.c-blue rect{fill:#E6F1FB;stroke:#185FA5}.c-gray rect{fill:#F1EFE8;stroke:#888780}.c-purple rect{fill:#EEEDFE;stroke:#534AB7}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-gray"><rect x="180" y="50" width="320" height="104" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="70" text-anchor="middle" dominant-baseline="central">Sensed at the PA</text>
<text class="ts" x="196" y="90">free: forward power - SWR - reflected</text>
<text class="ts" x="196" y="108">heatsink temp - TX/RX/band - drive</text>
<text class="ts" x="196" y="128">+1 cheap sensor each: drain current -</text>
<text class="ts" x="196" y="146">rail voltage - enclosure temp - GPSDO lock</text></g>
<line x1="340" y1="154" x2="340" y2="170" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue"><rect x="240" y="172" width="200" height="46" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="189" text-anchor="middle" dominant-baseline="central">Local IO bridge</text>
<text class="ts" x="340" y="205" text-anchor="middle" dominant-baseline="central">ESP32/Pico - ADC, at enclosure</text></g>
<line x1="340" y1="218" x2="340" y2="234" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="240" y="236" width="200" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="256" text-anchor="middle" dominant-baseline="central">LAN - MQTT / TCP</text></g>
<line x1="340" y1="276" x2="340" y2="292" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue"><rect x="240" y="294" width="200" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="314" text-anchor="middle" dominant-baseline="central">Node host</text></g>
<line x1="340" y1="334" x2="340" y2="350" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple"><rect x="120" y="352" width="440" height="74" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="370" text-anchor="middle" dominant-baseline="central">Web UI tiles</text>
<text class="ts" x="340" y="392" text-anchor="middle" dominant-baseline="central">per band: power - SWR - heatsink temp - state</text>
<text class="ts" x="340" y="410" text-anchor="middle" dominant-baseline="central">station: drive - rail V - drain I - enclosure temp - GPSDO - link</text></g>

<text class="ts" x="340" y="446" text-anchor="middle">PA protection is autonomous in hardware (microseconds, no network).</text>
<text class="ts" x="340" y="462" text-anchor="middle">This path carries read-only telemetry + the supervisory software-ALC loop.</text>
</svg>
