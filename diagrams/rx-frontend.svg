<svg xmlns="http://www.w3.org/2000/svg" width="700" viewBox="0 0 700 480" role="img">
<title>RX front-end packaging (carrier board)</title>
<desc>A shielded carrier board holds an input and output ADRF5040 SP4T and a bypassable LNA, hosting the 222, 70 cm and 902 filter modules in their own compartments. The 2 m DCI cavity is external. The wideband discone path is a separate, unfiltered SDR input.</desc>
<style>
text{font-family:Arial,Helvetica,sans-serif}
.t{font-size:14px;fill:#2C2C2A}.ts{font-size:12px;fill:#444441}.th{font-size:14px;font-weight:500;fill:#2C2C2A}
.c-blue rect{fill:#E6F1FB;stroke:#185FA5}.c-gray rect{fill:#F1EFE8;stroke:#888780}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="130" y="100" width="500" height="252" rx="10" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="5 4"/>
<text class="ts" x="138" y="94">Carrier board - shielded enclosure</text>
<text class="ts" x="138" y="344">on-board filters + LNA each in their own shielded compartment</text>

<g class="c-gray"><rect x="18" y="200" width="104" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="70" y="226" text-anchor="middle" dominant-baseline="central">From antennas</text></g>
<line x1="122" y1="226" x2="148" y2="226" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="150" y="200" width="84" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="192" y="218" text-anchor="middle" dominant-baseline="central">SP4T in</text>
<text class="ts" x="192" y="236" text-anchor="middle" dominant-baseline="central">ADRF5040</text></g>

<g class="c-gray"><rect x="290" y="44" width="160" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="370" y="60" text-anchor="middle" dominant-baseline="central">2 m cavity</text>
<text class="ts" x="370" y="78" text-anchor="middle" dominant-baseline="central">DCI-146-4H (external)</text></g>
<g class="c-gray"><rect x="290" y="120" width="160" height="42" rx="8" stroke-width="0.5"/>
<text class="th" x="370" y="136" text-anchor="middle" dominant-baseline="central">222 helical</text>
<text class="ts" x="370" y="153" text-anchor="middle" dominant-baseline="central">Temwell</text></g>
<g class="c-gray"><rect x="290" y="176" width="160" height="42" rx="8" stroke-width="0.5"/>
<text class="th" x="370" y="192" text-anchor="middle" dominant-baseline="central">70 cm helical</text>
<text class="ts" x="370" y="209" text-anchor="middle" dominant-baseline="central">Temwell</text></g>
<g class="c-gray"><rect x="290" y="232" width="160" height="42" rx="8" stroke-width="0.5"/>
<text class="th" x="370" y="248" text-anchor="middle" dominant-baseline="central">902</text>
<text class="ts" x="370" y="265" text-anchor="middle" dominant-baseline="central">FreeWave EBF901</text></g>

<line x1="234" y1="226" x2="288" y2="68" class="arr" marker-end="url(#arrow)"/>
<line x1="234" y1="226" x2="288" y2="141" class="arr" marker-end="url(#arrow)"/>
<line x1="234" y1="226" x2="288" y2="197" class="arr" marker-end="url(#arrow)"/>
<line x1="234" y1="226" x2="288" y2="253" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="510" y="200" width="84" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="552" y="218" text-anchor="middle" dominant-baseline="central">SP4T out</text>
<text class="ts" x="552" y="236" text-anchor="middle" dominant-baseline="central">ADRF5040</text></g>
<line x1="450" y1="66" x2="508" y2="212" class="arr" marker-end="url(#arrow)"/>
<line x1="450" y1="141" x2="508" y2="219" class="arr" marker-end="url(#arrow)"/>
<line x1="450" y1="197" x2="508" y2="226" class="arr" marker-end="url(#arrow)"/>
<line x1="450" y1="253" x2="508" y2="240" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="510" y="284" width="120" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="570" y="306" text-anchor="middle" dominant-baseline="central">Bypassable LNA</text></g>
<line x1="552" y1="252" x2="552" y2="284" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue"><rect x="510" y="360" width="120" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="570" y="382" text-anchor="middle" dominant-baseline="central">To SDR</text></g>
<line x1="570" y1="328" x2="570" y2="360" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="18" y="422" width="190" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="113" y="442" text-anchor="middle" dominant-baseline="central">Wideband RX (discone)</text></g>
<line x1="208" y1="442" x2="508" y2="442" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="300" y="434">unfiltered - separate input</text>
<g class="c-blue"><rect x="510" y="422" width="120" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="570" y="442" text-anchor="middle" dominant-baseline="central">SDR input</text></g>
</svg>
