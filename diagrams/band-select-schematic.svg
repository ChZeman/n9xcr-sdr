<svg xmlns="http://www.w3.org/2000/svg" width="900" viewBox="0 0 900 600" role="img">
<title>ADRF5040 band-select schematic</title>
<desc>Functional schematic of the TX band selector: an ADRF5040 SP4T switch with RFC common fed from the 7020-SDR onboard PA and RF1-RF4 routed to the four per-band bandpass/driver chains, powered from +3.3 V and a -3.3 V rail generated by an ADM8829 charge-pump inverter, with RF DC-block and supply-decoupling capacitors and a 2-bit V1/V2 band-select control from the node control MCU.</desc>
<style>
text{font-family:Arial,Helvetica,sans-serif}
.tb{font-size:15px;font-weight:600;fill:#2C2C2A}
.t{font-size:12px;fill:#2C2C2A}
.ts{font-size:10.5px;fill:#55534e}
.pin{font-size:10px;fill:#2C2C2A}
.ic{fill:#E6F1FB;stroke:#185FA5;stroke-width:1.2}
.ic2{fill:#EEEDFE;stroke:#534AB7;stroke-width:1.2}
.w{stroke:#444441;stroke-width:1.6;fill:none}
.wr{stroke:#b0392f;stroke-width:1.8;fill:none}
.wn{stroke:#1d6fa5;stroke-width:1.8;fill:none}
.cap{stroke:#2C2C2A;stroke-width:1.7;fill:none}
.dot{fill:#444441}
</style>

<text class="tb" x="30" y="28">ADRF5040 band selector — functional schematic</text>
<text class="ts" x="30" y="45">One SP4T switch + a −3.3 V charge-pump rail. Pin numbers per the ADRF5040 / ADM8829 datasheets.</text>

<line class="wr" x1="640" y1="34" x2="664" y2="34"/><text class="ts" x="670" y="38">+3.3 V</text>
<line class="wn" x1="720" y1="34" x2="744" y2="34"/><text class="ts" x="750" y="38">−3.3 V</text>
<line class="w"  x1="800" y1="34" x2="824" y2="34"/><text class="ts" x="830" y="38">RF / GND</text>

<line class="wr" x1="90" y1="92" x2="820" y2="92"/>
<text class="t" x="52" y="96">+3.3 V</text>
<circle class="dot" cx="90" cy="92" r="3"/><circle class="dot" cx="590" cy="92" r="3"/>

<rect class="ic2" x="120" y="150" width="150" height="130" rx="6"/>
<text class="tb" x="195" y="206" text-anchor="middle">ADM8829</text>
<text class="ts" x="195" y="224" text-anchor="middle">−3.3 V charge pump</text>

<text class="pin" x="126" y="178">V+</text>
<line class="wr" x1="120" y1="175" x2="90" y2="175"/><line class="wr" x1="90" y1="175" x2="90" y2="92"/>
<text class="pin" x="126" y="258">GND</text>
<line class="w" x1="120" y1="255" x2="96" y2="255"/><line class="w" x1="96" y1="255" x2="96" y2="296"/>
<line class="w" x1="84" y1="296" x2="108" y2="296"/><line class="w" x1="88" y1="301" x2="104" y2="301"/><line class="w" x1="92" y1="306" x2="100" y2="306"/>
<text class="pin" x="264" y="178" text-anchor="end">CAP+</text>
<text class="pin" x="264" y="213" text-anchor="end">CAP−</text>
<line class="w" x1="270" y1="175" x2="320" y2="175"/><line class="w" x1="320" y1="175" x2="320" y2="186"/>
<line class="cap" x1="306" y1="186" x2="334" y2="186"/><line class="cap" x1="306" y1="194" x2="334" y2="194"/>
<line class="w" x1="320" y1="194" x2="320" y2="210"/><line class="w" x1="270" y1="210" x2="320" y2="210"/>
<text class="ts" x="340" y="194">C1 1 µF</text>
<text class="pin" x="264" y="258" text-anchor="end">OUT</text>
<line class="wn" x1="270" y1="255" x2="380" y2="255"/>
<line class="wn" x1="380" y1="255" x2="380" y2="268"/>
<line class="cap" x1="366" y1="268" x2="394" y2="268"/><line class="cap" x1="366" y1="276" x2="394" y2="276"/>
<line class="w" x1="380" y1="276" x2="380" y2="296"/>
<line class="w" x1="368" y1="296" x2="392" y2="296"/><line class="w" x1="372" y1="301" x2="388" y2="301"/><line class="w" x1="376" y1="306" x2="384" y2="306"/>
<text class="ts" x="400" y="276">C2 1 µF</text>
<circle class="dot" cx="380" cy="255" r="3"/>
<line class="wn" x1="380" y1="255" x2="380" y2="120"/><line class="wn" x1="380" y1="120" x2="650" y2="120"/><line class="wn" x1="650" y1="120" x2="650" y2="160"/>

<rect class="ic" x="540" y="160" width="200" height="240" rx="6"/>
<text class="tb" x="640" y="276" text-anchor="middle">ADRF5040</text>
<text class="ts" x="640" y="294" text-anchor="middle">SP4T · LFCSP-24</text>

<text class="pin" x="590" y="176" text-anchor="middle">VDD</text>
<line class="wr" x1="590" y1="160" x2="590" y2="92"/>
<circle class="dot" cx="590" cy="140" r="3"/>
<line class="w" x1="590" y1="140" x2="772" y2="140"/><line class="w" x1="772" y1="140" x2="772" y2="150"/>
<line class="cap" x1="758" y1="150" x2="786" y2="150"/><line class="cap" x1="758" y1="158" x2="786" y2="158"/>
<line class="w" x1="772" y1="158" x2="772" y2="176"/>
<line class="w" x1="760" y1="176" x2="784" y2="176"/><line class="w" x1="764" y1="181" x2="780" y2="181"/><line class="w" x1="768" y1="186" x2="776" y2="186"/>
<text class="ts" x="792" y="158">Cd</text>
<text class="pin" x="650" y="176" text-anchor="middle">VSS</text>

<text class="pin" x="546" y="208">RFC</text>
<line class="w" x1="540" y1="210" x2="512" y2="210"/>
<line class="cap" x1="512" y1="200" x2="512" y2="220"/><line class="cap" x1="504" y1="200" x2="504" y2="220"/>
<line class="w" x1="504" y1="210" x2="400" y2="210"/>
<text class="ts" x="508" y="197">Cb</text>
<text class="t" x="396" y="206" text-anchor="end">RF in — from 7020-SDR</text>
<text class="ts" x="396" y="220" text-anchor="end">(onboard PA, low level)</text>

<g>
<text class="pin" x="734" y="206" text-anchor="end">RF1</text>
<line class="w" x1="740" y1="208" x2="756" y2="208"/>
<line class="cap" x1="756" y1="198" x2="756" y2="218"/><line class="cap" x1="764" y1="198" x2="764" y2="218"/>
<line class="w" x1="764" y1="208" x2="804" y2="208"/>
<text class="t" x="810" y="205">2 m</text><text class="ts" x="810" y="218">→ BPF + driver</text>
</g>
<g>
<text class="pin" x="734" y="248" text-anchor="end">RF2</text>
<line class="w" x1="740" y1="250" x2="756" y2="250"/>
<line class="cap" x1="756" y1="240" x2="756" y2="260"/><line class="cap" x1="764" y1="240" x2="764" y2="260"/>
<line class="w" x1="764" y1="250" x2="804" y2="250"/>
<text class="t" x="810" y="247">222</text><text class="ts" x="810" y="260">→ BPF + driver</text>
</g>
<g>
<text class="pin" x="734" y="293" text-anchor="end">RF3</text>
<line class="w" x1="740" y1="295" x2="756" y2="295"/>
<line class="cap" x1="756" y1="285" x2="756" y2="305"/><line class="cap" x1="764" y1="285" x2="764" y2="305"/>
<line class="w" x1="764" y1="295" x2="804" y2="295"/>
<text class="t" x="810" y="292">70 cm</text><text class="ts" x="810" y="305">→ BPF + driver</text>
</g>
<g>
<text class="pin" x="734" y="338" text-anchor="end">RF4</text>
<line class="w" x1="740" y1="340" x2="756" y2="340"/>
<line class="cap" x1="756" y1="330" x2="756" y2="350"/><line class="cap" x1="764" y1="330" x2="764" y2="350"/>
<line class="w" x1="764" y1="340" x2="804" y2="340"/>
<text class="t" x="810" y="337">902</text><text class="ts" x="810" y="350">→ BPF + driver</text>
</g>

<text class="pin" x="600" y="392" text-anchor="middle">V1</text>
<text class="pin" x="650" y="392" text-anchor="middle">V2</text>
<line class="w" x1="600" y1="400" x2="600" y2="440"/><line class="w" x1="650" y1="400" x2="650" y2="440"/>
<line class="w" x1="600" y1="440" x2="650" y2="440"/><line class="w" x1="625" y1="440" x2="625" y2="454"/>
<text class="t" x="625" y="470" text-anchor="middle">band select — 2 bits</text>
<text class="ts" x="625" y="484" text-anchor="middle">from control MCU · 3.3 V CMOS GPIO</text>

<text class="pin" x="700" y="392" text-anchor="middle">GND pad</text>
<line class="w" x1="700" y1="400" x2="700" y2="418"/>
<line class="w" x1="688" y1="418" x2="712" y2="418"/><line class="w" x1="692" y1="423" x2="708" y2="423"/><line class="w" x1="696" y1="428" x2="704" y2="428"/>

<rect x="40" y="350" width="196" height="118" rx="6" fill="#F7F6F1" stroke="#cbc9c0" stroke-width="1"/>
<text class="t" x="52" y="370">Port → band (design choice)</text>
<text class="ts" x="56" y="390">RF1 — 2 m (144–148)</text>
<text class="ts" x="56" y="406">RF2 — 222 (222–225)</text>
<text class="ts" x="56" y="422">RF3 — 70 cm (420–450)</text>
<text class="ts" x="56" y="438">RF4 — 902 (902–928)</text>
<text class="ts" x="56" y="458">V1/V2 decode: per datasheet truth table</text>

<text class="ts" x="30" y="512">Power: +3.3 V → VDD and ADM8829 V+ ;  ADM8829 OUT (−3.3 V) → VSS.  Only one band keyed at a time.</text>
<text class="ts" x="30" y="528">Cb = RF DC-block ~1 nF C0G (RFC + RF1–4).  Cd = 100 nF + bulk (1–10 µF) on VDD and VSS to GND.</text>
<text class="ts" x="30" y="544">Board: FR-4 OK ≤ 928 MHz; solid ground pour + via array under the LFCSP exposed pad.</text>
</svg>
