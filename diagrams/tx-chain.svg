<text class="ts" x="340" y="538" text-anchor="middle" dominant-baseline="central">power-rated 50 W - antenna select + RF-exposure maintenance lockout</text>
<text class="ts" x="340" y="553" text-anchor="middle" dominant-baseline="central">one band live at a time - TBD power SP4T / SP6T coax relay</text></g>

<line x1="150" y1="564" x2="150" y2="588" class="arr" marker-end="url(#arrow)"/>
