<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 680" role="img">
<title>VHF/UHF transmit chain ending at per-band low-pass filters (node boundary)</title>
<desc>7020-SDR exciter with onboard PA feeds the PE42512A SP12T band-select, switching at low level (~80 mW) to one of four per-band chains: bandpass, CGH40010 driver, MRF101AN (2m, 222) or CGH40120F (70cm, 902) final inside the control wrapper, and a low-pass filter. The chain ends at four per-band 50 W RF outputs; how those outputs are routed - direct to antennas, through a triplexer, a switch, or a dummy load with RF-exposure lockout - is defined per station, not by the node design. Bands shown are the US / IARU R2 example; the band-select covers 4 m-5.8 GHz, so populate your region's slices.</desc>
<style>
text{font-family:Arial,Helvetica,sans-serif}
.t{font-size:14px;fill:#2C2C2A}.ts{font-size:12px;fill:#444441}.th{font-size:14px;font-weight:500;fill:#2C2C2A}
.c-blue rect{fill:#E6F1FB;stroke:#185FA5}.c-gray rect{fill:#F1EFE8;stroke:#888780}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56}.c-purple rect{fill:#EEEDFE;stroke:#534AB7}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-blue"><rect x="240" y="40" width="200" height="52" rx="8" stroke-width="0.5"/>
