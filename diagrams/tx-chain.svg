<text class="th" x="150" y="608" text-anchor="middle" dominant-baseline="central">Tram tri-band NMO</text>
<text class="ts" x="150" y="626" text-anchor="middle" dominant-baseline="central">2m/70cm/902 (triplexer)</text></g>
<g class="c-gray"><rect x="250" y="590" width="180" height="54" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="608" text-anchor="middle" dominant-baseline="central">Comet 222 whip</text>
<text class="ts" x="340" y="626" text-anchor="middle" dominant-baseline="central">222 MHz</text></g>
<g class="c-coral"><rect x="440" y="590" width="180" height="54" rx="8" stroke-width="0.5"/>
