<text class="ts" x="530" y="626" text-anchor="middle" dominant-baseline="central">test + maintenance lockout</text></g>

<rect class="c-teal" x="120" y="662" width="13" height="13" rx="3" stroke-width="0.5"/>
<text class="ts" x="140" y="672">LDMOS final</text>
<rect class="c-purple" x="250" y="662" width="13" height="13" rx="3" stroke-width="0.5"/>
<text class="ts" x="270" y="672">GaN final</text>
<rect class="c-coral" x="360" y="662" width="13" height="13" rx="3" stroke-width="0.5"/>
<text class="ts" x="380" y="672">power output / 50 W</text>
</svg>
