<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 584" role="img">
<title>VHF/UHF transmit chain with part numbers</title>
<desc>7020-SDR exciter with onboard PA providing pre-driver-level output, ADRF5040 SP4T band-select switching at low level, then four per-band chains each with a bandpass, CGH40010 driver, final (MRF101AN for 2m and 222, CGH40120F for 70cm and 902) inside the control wrapper, and a low-pass filter, out to antenna routing.</desc>
<style>
text{font-family:Arial,Helvetica,sans-serif}
.t{font-size:14px;fill:#2C2C2A}.ts{font-size:12px;fill:#444441}.th{font-size:14px;font-weight:500;fill:#2C2C2A}
.c-blue rect{fill:#E6F1FB;stroke:#185FA5}.c-gray rect{fill:#F1EFE8;stroke:#888780}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56}.c-purple rect{fill:#EEEDFE;stroke:#534AB7}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-blue"><rect x="240" y="40" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="60" text-anchor="middle" dominant-baseline="central">7020-SDR</text>
<text class="ts" x="340" y="78" text-anchor="middle" dominant-baseline="central">onboard PA - ~+15-19 dBm</text></g>
<line x1="340" y1="92" x2="340" y2="106" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="240" y="108" width="200" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="126" text-anchor="middle" dominant-baseline="central">TX band-select</text>
<text class="ts" x="340" y="142" text-anchor="middle" dominant-baseline="central">ADRF5040 SP4T</text></g>

<line x1="340" y1="156" x2="116" y2="178" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="156" x2="266" y2="178" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="156" x2="414" y2="178" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="156" x2="562" y2="178" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="50" y="180" width="130" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="115" y="198" text-anchor="middle" dominant-baseline="central">2 m</text>
<text class="ts" x="115" y="216" text-anchor="middle" dominant-baseline="central">BPF 144-148</text></g>
<g class="c-gray"><rect x="200" y="180" width="130" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="265" y="198" text-anchor="middle" dominant-baseline="central">222 MHz</text>
<text class="ts" x="265" y="216" text-anchor="middle" dominant-baseline="central">BPF 222-225</text></g>
<g class="c-gray"><rect x="350" y="180" width="130" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="415" y="198" text-anchor="middle" dominant-baseline="central">70 cm</text>
<text class="ts" x="415" y="216" text-anchor="middle" dominant-baseline="central">BPF 420-450</text></g>
<g class="c-gray"><rect x="500" y="180" width="130" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="565" y="198" text-anchor="middle" dominant-baseline="central">902 MHz</text>
<text class="ts" x="565" y="216" text-anchor="middle" dominant-baseline="central">BPF 902-928</text></g>

<line x1="115" y1="232" x2="115" y2="244" class="arr" marker-end="url(#arrow)"/>
<line x1="265" y1="232" x2="265" y2="244" class="arr" marker-end="url(#arrow)"/>
<line x1="415" y1="232" x2="415" y2="244" class="arr" marker-end="url(#arrow)"/>
<line x1="565" y1="232" x2="565" y2="244" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="50" y="246" width="130" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="115" y="264" text-anchor="middle" dominant-baseline="central">Driver</text>
<text class="ts" x="115" y="280" text-anchor="middle" dominant-baseline="central">CGH40010</text></g>
<g class="c-gray"><rect x="200" y="246" width="130" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="265" y="264" text-anchor="middle" dominant-baseline="central">Driver</text>
<text class="ts" x="265" y="280" text-anchor="middle" dominant-baseline="central">CGH40010</text></g>
<g class="c-gray"><rect x="350" y="246" width="130" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="415" y="264" text-anchor="middle" dominant-baseline="central">Driver</text>
<text class="ts" x="415" y="280" text-anchor="middle" dominant-baseline="central">CGH40010</text></g>
<g class="c-gray"><rect x="500" y="246" width="130" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="565" y="264" text-anchor="middle" dominant-baseline="central">Driver</text>
<text class="ts" x="565" y="280" text-anchor="middle" dominant-baseline="central">CGH40010</text></g>

<line x1="115" y1="294" x2="115" y2="314" class="arr" marker-end="url(#arrow)"/>
<line x1="265" y1="294" x2="265" y2="314" class="arr" marker-end="url(#arrow)"/>
<line x1="415" y1="294" x2="415" y2="314" class="arr" marker-end="url(#arrow)"/>
<line x1="565" y1="294" x2="565" y2="314" class="arr" marker-end="url(#arrow)"/>

<text class="ts" x="340" y="307" text-anchor="middle">Control wrapper</text>
<rect x="40" y="312" width="600" height="66" rx="8" fill="none" stroke="#BA7517" stroke-width="0.8" stroke-dasharray="4 3"/>

<g class="c-teal"><rect x="50" y="316" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="115" y="334" text-anchor="middle" dominant-baseline="central">Final</text>
<text class="ts" x="115" y="352" text-anchor="middle" dominant-baseline="central">MRF101AN</text></g>
<g class="c-teal"><rect x="200" y="316" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="265" y="334" text-anchor="middle" dominant-baseline="central">Final</text>
<text class="ts" x="265" y="352" text-anchor="middle" dominant-baseline="central">MRF101AN</text></g>
<g class="c-purple"><rect x="350" y="316" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="415" y="334" text-anchor="middle" dominant-baseline="central">Final</text>
<text class="ts" x="415" y="352" text-anchor="middle" dominant-baseline="central">CGH40120F</text></g>
<g class="c-purple"><rect x="500" y="316" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="565" y="334" text-anchor="middle" dominant-baseline="central">Final</text>
<text class="ts" x="565" y="352" text-anchor="middle" dominant-baseline="central">CGH40120F</text></g>

<line x1="115" y1="372" x2="115" y2="408" class="arr" marker-end="url(#arrow)"/>
<line x1="265" y1="372" x2="265" y2="408" class="arr" marker-end="url(#arrow)"/>
<line x1="415" y1="372" x2="415" y2="408" class="arr" marker-end="url(#arrow)"/>
<line x1="565" y1="372" x2="565" y2="408" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="50" y="410" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="115" y="428" text-anchor="middle" dominant-baseline="central">LPF</text>
<text class="ts" x="115" y="446" text-anchor="middle" dominant-baseline="central">fc 165 MHz</text></g>
<g class="c-gray"><rect x="200" y="410" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="265" y="428" text-anchor="middle" dominant-baseline="central">LPF</text>
<text class="ts" x="265" y="446" text-anchor="middle" dominant-baseline="central">fc 250 MHz</text></g>
<g class="c-gray"><rect x="350" y="410" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="415" y="428" text-anchor="middle" dominant-baseline="central">LPF</text>
<text class="ts" x="415" y="446" text-anchor="middle" dominant-baseline="central">fc 500 MHz</text></g>
<g class="c-gray"><rect x="500" y="410" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="565" y="428" text-anchor="middle" dominant-baseline="central">LPF</text>
<text class="ts" x="565" y="446" text-anchor="middle" dominant-baseline="central">fc 1010 MHz</text></g>

<line x1="115" y1="466" x2="115" y2="502" class="arr" marker-end="url(#arrow)"/>
<line x1="265" y1="466" x2="265" y2="502" class="arr" marker-end="url(#arrow)"/>
<line x1="415" y1="466" x2="415" y2="502" class="arr" marker-end="url(#arrow)"/>
<line x1="565" y1="466" x2="565" y2="502" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="40" y="504" width="600" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="524" text-anchor="middle" dominant-baseline="central">To antenna routing</text>
<text class="ts" x="340" y="540" text-anchor="middle" dominant-baseline="central">triplexer - whips (see rx-chain)</text></g>

<rect class="c-teal" x="150" y="562" width="13" height="13" rx="3" stroke-width="0.5"/>
<text class="ts" x="170" y="572">LDMOS final</text>
<rect class="c-purple" x="320" y="562" width="13" height="13" rx="3" stroke-width="0.5"/>
<text class="ts" x="340" y="572">GaN final</text>
</svg>
