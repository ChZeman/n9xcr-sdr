<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 580" role="img">
<title>VHF/UHF transmit chain with part numbers</title>
<desc>AntSDR E200 exciter through a shared pre-driver and driver, TX band-select, per-band finals (MRF101AN for 2m and 222, CGH40120F for 70cm and 902), per-band low-pass filters, out to antenna routing. The finals are enclosed by a control wrapper.</desc>
<style>
text{font-family:Arial,Helvetica,sans-serif}
.t{font-size:14px;fill:#2C2C2A}
.ts{font-size:12px;fill:#444441}
.th{font-size:14px;font-weight:500;fill:#2C2C2A}
.c-blue rect{fill:#E6F1FB;stroke:#185FA5}
.c-gray rect{fill:#F1EFE8;stroke:#888780}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-blue"><rect x="240" y="40" width="200" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="62" text-anchor="middle" dominant-baseline="central">AntSDR E200</text>
<text class="ts" x="340" y="78" text-anchor="middle" dominant-baseline="central">exciter - TX ~0 dBm</text></g>
<line x1="340" y1="88" x2="340" y2="118" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="210" y="120" width="260" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="142" text-anchor="middle" dominant-baseline="central">Pre-driver + driver</text>
<text class="ts" x="340" y="160" text-anchor="middle" dominant-baseline="central">PGA-103+ class -&gt; ~2.5 W</text></g>
<line x1="340" y1="176" x2="340" y2="206" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="240" y="208" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="230" text-anchor="middle" dominant-baseline="central">TX band-select</text></g>

<line x1="340" y1="252" x2="118" y2="304" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="252" x2="266" y2="304" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="252" x2="414" y2="304" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="252" x2="562" y2="304" class="arr" marker-end="url(#arrow)"/>

<text class="ts" x="44" y="286">Control wrapper</text>
<rect x="40" y="294" width="600" height="80" rx="8" fill="none" stroke="#BA7517" stroke-width="0.8" stroke-dasharray="4 3"/>

<g class="c-teal"><rect x="50" y="306" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="115" y="328" text-anchor="middle" dominant-baseline="central">2 m</text>
<text class="ts" x="115" y="346" text-anchor="middle" dominant-baseline="central">MRF101AN</text></g>
<g class="c-teal"><rect x="200" y="306" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="265" y="328" text-anchor="middle" dominant-baseline="central">222 MHz</text>
<text class="ts" x="265" y="346" text-anchor="middle" dominant-baseline="central">MRF101AN</text></g>
<g class="c-purple"><rect x="350" y="306" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="415" y="328" text-anchor="middle" dominant-baseline="central">70 cm</text>
<text class="ts" x="415" y="346" text-anchor="middle" dominant-baseline="central">CGH40120F</text></g>
<g class="c-purple"><rect x="500" y="306" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="565" y="328" text-anchor="middle" dominant-baseline="central">902 MHz</text>
<text class="ts" x="565" y="346" text-anchor="middle" dominant-baseline="central">CGH40120F</text></g>

<line x1="115" y1="362" x2="115" y2="394" class="arr" marker-end="url(#arrow)"/>
<line x1="265" y1="362" x2="265" y2="394" class="arr" marker-end="url(#arrow)"/>
<line x1="415" y1="362" x2="415" y2="394" class="arr" marker-end="url(#arrow)"/>
<line x1="565" y1="362" x2="565" y2="394" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="50" y="396" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="115" y="418" text-anchor="middle" dominant-baseline="central">LPF</text>
<text class="ts" x="115" y="436" text-anchor="middle" dominant-baseline="central">fc 165 MHz</text></g>
<g class="c-gray"><rect x="200" y="396" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="265" y="418" text-anchor="middle" dominant-baseline="central">LPF</text>
<text class="ts" x="265" y="436" text-anchor="middle" dominant-baseline="central">fc 250 MHz</text></g>
<g class="c-gray"><rect x="350" y="396" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="415" y="418" text-anchor="middle" dominant-baseline="central">LPF</text>
<text class="ts" x="415" y="436" text-anchor="middle" dominant-baseline="central">fc 500 MHz</text></g>
<g class="c-gray"><rect x="500" y="396" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="565" y="418" text-anchor="middle" dominant-baseline="central">LPF</text>
<text class="ts" x="565" y="436" text-anchor="middle" dominant-baseline="central">fc 1010 MHz</text></g>

<line x1="115" y1="452" x2="115" y2="490" class="arr" marker-end="url(#arrow)"/>
<line x1="265" y1="452" x2="265" y2="490" class="arr" marker-end="url(#arrow)"/>
<line x1="415" y1="452" x2="415" y2="490" class="arr" marker-end="url(#arrow)"/>
<line x1="565" y1="452" x2="565" y2="490" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="40" y="490" width="600" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="512" text-anchor="middle" dominant-baseline="central">To antenna routing</text>
<text class="ts" x="340" y="528" text-anchor="middle" dominant-baseline="central">triplexer - whips (see rx-chain)</text></g>

<rect class="c-teal" x="150" y="556" width="13" height="13" rx="3" stroke-width="0.5"/>
<text class="ts" x="170" y="566">LDMOS final</text>
<rect class="c-purple" x="320" y="556" width="13" height="13" rx="3" stroke-width="0.5"/>
<text class="ts" x="340" y="566">GaN final</text>
</svg>
