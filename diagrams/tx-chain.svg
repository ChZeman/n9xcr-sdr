<text class="ts" x="340" y="307" text-anchor="middle">Control wrapper</text>
<rect x="40" y="312" width="600" height="66" rx="8" fill="none" stroke="#BA7517" stroke-width="0.8" stroke-dasharray="4 3"/>

<g class="c-teal"><rect x="50" y="316" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="115" y="334" text-anchor="middle" dominant-baseline="central">Final</text>
<text class="ts" x="115" y="352" text-anchor="middle" dominant-baseline="central">MRF101AN</text></g>
