<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 612" role="img">
<title>VHF/UHF transmit chain with part numbers</title>
<desc>AntSDR E200 exciter, PGA-103+ pre-driver, CGH40010 driver, TX band-select, then per-band finals (MRF101AN for 2m and 222, CGH40120F for 70cm and 902) inside a control wrapper, per-band low-pass filters, out to antenna routing.</desc>
<style>
text{font-family:Arial,Helvetica,sans-serif}
.t{font-size:14px;fill:#2C2C2A}.ts{font-size:12px;fill:#444441}.th{font-size:14px;font-weight:500;fill:#2C2C2A}
.c-blue rect{fill:#E6F1FB;stroke:#185FA5}.c-gray rect{fill:#F1EFE8;stroke:#888780}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56}.c-purple rect{fill:#EEEDFE;stroke:#534AB7}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-blue"><rect x="240" y="40" width="200" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="62" text-anchor="middle" dominant-baseline="central">AntSDR E200</text>
<text class="ts" x="340" y="78" text-anchor="middle" dominant-baseline="central">exciter - TX ~0 dBm</text></g>
<line x1="340" y1="88" x2="340" y2="106" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="240" y="108" width="200" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="130" text-anchor="middle" dominant-baseline="central">Pre-driver</text>
<text class="ts" x="340" y="146" text-anchor="middle" dominant-baseline="central">PGA-103+ - ~22 dB</text></g>
<line x1="340" y1="156" x2="340" y2="174" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="240" y="176" width="200" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="198" text-anchor="middle" dominant-baseline="central">Driver</text>
<text class="ts" x="340" y="214" text-anchor="middle" dominant-baseline="central">CGH40010 - to ~4 W</text></g>
<line x1="340" y1="224" x2="340" y2="242" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="240" y="244" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="266" text-anchor="middle" dominant-baseline="central">TX band-select</text></g>

<line x1="340" y1="288" x2="118" y2="334" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="288" x2="266" y2="334" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="288" x2="414" y2="334" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="288" x2="562" y2="334" class="arr" marker-end="url(#arrow)"/>

<text class="ts" x="44" y="320">Control wrapper</text>
<rect x="40" y="326" width="600" height="84" rx="8" fill="none" stroke="#BA7517" stroke-width="0.8" stroke-dasharray="4 3"/>

<g class="c-teal"><rect x="50" y="336" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="115" y="358" text-anchor="middle" dominant-baseline="central">2 m</text>
<text class="ts" x="115" y="376" text-anchor="middle" dominant-baseline="central">MRF101AN</text></g>
<g class="c-teal"><rect x="200" y="336" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="265" y="358" text-anchor="middle" dominant-baseline="central">222 MHz</text>
<text class="ts" x="265" y="376" text-anchor="middle" dominant-baseline="central">MRF101AN</text></g>
<g class="c-purple"><rect x="350" y="336" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="415" y="358" text-anchor="middle" dominant-baseline="central">70 cm</text>
<text class="ts" x="415" y="376" text-anchor="middle" dominant-baseline="central">CGH40120F</text></g>
<g class="c-purple"><rect x="500" y="336" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="565" y="358" text-anchor="middle" dominant-baseline="central">902 MHz</text>
<text class="ts" x="565" y="376" text-anchor="middle" dominant-baseline="central">CGH40120F</text></g>

<line x1="115" y1="392" x2="115" y2="424" class="arr" marker-end="url(#arrow)"/>
<line x1="265" y1="392" x2="265" y2="424" class="arr" marker-end="url(#arrow)"/>
<line x1="415" y1="392" x2="415" y2="424" class="arr" marker-end="url(#arrow)"/>
<line x1="565" y1="392" x2="565" y2="424" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="50" y="426" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="115" y="448" text-anchor="middle" dominant-baseline="central">LPF</text>
<text class="ts" x="115" y="466" text-anchor="middle" dominant-baseline="central">fc 165 MHz</text></g>
<g class="c-gray"><rect x="200" y="426" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="265" y="448" text-anchor="middle" dominant-baseline="central">LPF</text>
<text class="ts" x="265" y="466" text-anchor="middle" dominant-baseline="central">fc 250 MHz</text></g>
<g class="c-gray"><rect x="350" y="426" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="415" y="448" text-anchor="middle" dominant-baseline="central">LPF</text>
<text class="ts" x="415" y="466" text-anchor="middle" dominant-baseline="central">fc 500 MHz</text></g>
<g class="c-gray"><rect x="500" y="426" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="565" y="448" text-anchor="middle" dominant-baseline="central">LPF</text>
<text class="ts" x="565" y="466" text-anchor="middle" dominant-baseline="central">fc 1010 MHz</text></g>

<line x1="115" y1="482" x2="115" y2="518" class="arr" marker-end="url(#arrow)"/>
<line x1="265" y1="482" x2="265" y2="518" class="arr" marker-end="url(#arrow)"/>
<line x1="415" y1="482" x2="415" y2="518" class="arr" marker-end="url(#arrow)"/>
<line x1="565" y1="482" x2="565" y2="518" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="40" y="520" width="600" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="540" text-anchor="middle" dominant-baseline="central">To antenna routing</text>
<text class="ts" x="340" y="556" text-anchor="middle" dominant-baseline="central">triplexer - whips (see rx-chain)</text></g>

<rect class="c-teal" x="150" y="584" width="13" height="13" rx="3" stroke-width="0.5"/>
<text class="ts" x="170" y="594">LDMOS final</text>
<rect class="c-purple" x="320" y="584" width="13" height="13" rx="3" stroke-width="0.5"/>
<text class="ts" x="340" y="594">GaN final</text>
</svg>
