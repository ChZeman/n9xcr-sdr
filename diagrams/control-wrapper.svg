<svg xmlns="http://www.w3.org/2000/svg" width="700" viewBox="0 0 700 460" role="img">
<title>PA control and protection wrapper</title>
<desc>Signal path: drive in, PA final, dual directional detector, T/R relay, antenna. An amplifier control board provides gate-bias keying, SWR/reflected foldback, thermal foldback with fan, overcurrent trip and T/R sequencing, fed by a heatsink thermistor, drain-current and rail-voltage sensing. Alarms and the software-ALC supervisory loop connect to the node host.</desc>
<style>
text{font-family:Arial,Helvetica,sans-serif}
.t{font-size:14px;fill:#2C2C2A}.ts{font-size:12px;fill:#444441}.th{font-size:14px;font-weight:500;fill:#2C2C2A}
.c-blue rect{fill:#E6F1FB;stroke:#185FA5}.c-gray rect{fill:#F1EFE8;stroke:#888780}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56}.c-amber rect{fill:#FBF1E0;stroke:#BA7517}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}.dash{stroke:#BA7517;stroke-width:1.3;fill:none;stroke-dasharray:4 3}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrowA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<g class="c-gray"><rect x="24" y="60" width="100" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="74" y="80" text-anchor="middle" dominant-baseline="central">Drive in</text>
<text class="ts" x="74" y="96" text-anchor="middle" dominant-baseline="central">from driver</text></g>
<line x1="124" y1="86" x2="146" y2="86" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal"><rect x="148" y="60" width="130" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="213" y="80" text-anchor="middle" dominant-baseline="central">PA final</text>
<text class="ts" x="213" y="96" text-anchor="middle" dominant-baseline="central">per band</text></g>
<line x1="278" y1="86" x2="300" y2="86" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="302" y="60" width="150" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="377" y="80" text-anchor="middle" dominant-baseline="central">Dual directional</text>
<text class="ts" x="377" y="96" text-anchor="middle" dominant-baseline="central">detector (fwd/refl)</text></g>
<line x1="452" y1="86" x2="474" y2="86" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="476" y="60" width="100" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="526" y="86" text-anchor="middle" dominant-baseline="central">T/R relay</text></g>
<line x1="576" y1="86" x2="598" y2="86" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="600" y="60" width="76" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="638" y="86" text-anchor="middle" dominant-baseline="central">Antenna</text></g>

<line x1="200" y1="228" x2="200" y2="114" class="dash" marker-end="url(#arrowA)"/>
<text class="ts" x="205" y="178">bias</text>
<line x1="377" y1="114" x2="377" y2="228" class="dash" marker-end="url(#arrowA)"/>
<text class="ts" x="382" y="178">fwd/refl</text>
<line x1="440" y1="228" x2="524" y2="114" class="dash" marker-end="url(#arrowA)"/>
<text class="ts" x="470" y="172">T/R</text>

<g class="c-amber"><rect x="150" y="230" width="320" height="120" rx="8" stroke-width="0.5"/>
<text class="th" x="310" y="248" text-anchor="middle" dominant-baseline="central">Amplifier control board</text>
<text class="ts" x="168" y="274">- gate-bias keying</text>
<text class="ts" x="168" y="292">- SWR / reflected foldback</text>
<text class="ts" x="168" y="310">- thermal foldback + fan</text>
<text class="ts" x="168" y="328">- overcurrent / overdrive trip</text>
<text class="ts" x="168" y="346">- T/R sequencing</text></g>

<g class="c-gray"><rect x="500" y="200" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="590" y="220" text-anchor="middle" dominant-baseline="central">Heatsink thermistor</text></g>
<line x1="500" y1="220" x2="472" y2="250" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="500" y="250" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="590" y="270" text-anchor="middle" dominant-baseline="central">Drain-current sense</text></g>
<line x1="500" y1="270" x2="472" y2="285" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="500" y="300" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="590" y="320" text-anchor="middle" dominant-baseline="central">Rail-voltage sense</text></g>
<line x1="500" y1="320" x2="472" y2="318" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="500" y="350" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="590" y="370" text-anchor="middle" dominant-baseline="central">Fan (temp-controlled)</text></g>
<line x1="470" y1="335" x2="500" y2="368" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue"><rect x="150" y="392" width="320" height="46" rx="8" stroke-width="0.5"/>
<text class="th" x="310" y="409" text-anchor="middle" dominant-baseline="central">Node host</text>
<text class="ts" x="310" y="425" text-anchor="middle" dominant-baseline="central">software ALC: alarms up / drive-cut, TX-inhibit down</text></g>
<line x1="310" y1="350" x2="310" y2="392" class="arr" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
</svg>
